name: Supabase Keep-Alive

on:
  schedule:
    # Runs every 4 days at 9:00 AM UTC
    - cron: '0 9 */4 * *'
  workflow_dispatch: # Allow manual trigger from GitHub Actions tab

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase (keep project active)
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.VITE_SUPABASE_URL }}/rest/v1/invoices?select=id&limit=1" \
            -H "apikey: ${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.VITE_SUPABASE_ANON_KEY }}")

          echo "Supabase response: $RESPONSE"

          if [ "$RESPONSE" = "200" ] || [ "$RESPONSE" = "401" ]; then
            echo "✅ Supabase is alive and responding."
          else
            echo "⚠️ Unexpected response: $RESPONSE"
            exit 1
          fi
